{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-2 mb-4">
        <div class="sidebar shadow-sm">
            <a href="{{ url_for('staff.dashboard') }}" class="sidebar-link {{ 'active' if active_page == 'dashboard' }}">🏕️ Dashboard</a>
            <a href="{{ url_for('staff.my_treks') }}" class="sidebar-link {{ 'active' if active_page == 'treks' }}">🥾 My Treks</a>
            <a href="{{ url_for('auth.logout') }}" class="sidebar-link text-danger">🚪 Logout</a>
        </div>
    </div>
    <div class="col-md-10">
        {% block staff_content %}{% endblock %}
    </div>
</div>
{% endblock %}
