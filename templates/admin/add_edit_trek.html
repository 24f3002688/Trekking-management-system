{% extends "admin/layout.html" %}

{% block title %}{{ 'Edit Trek' if trek else 'Add Trek' }}{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4">{{ 'Edit Trek' if trek else 'Add New Trek' }}</h3>

            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Trek Name</label>
                        <input type="text" class="form-control" name="name" value="{{ trek.name if trek else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" name="location" value="{{ trek.location if trek else '' }}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Difficulty</label>
                        <select class="form-select" name="difficulty" required>
                            <option value="" disabled {{ 'selected' if not trek else '' }}>-- Select --</option>
                            {% for level in ['Easy', 'Moderate', 'Hard'] %}
                            <option value="{{ level }}" {{ 'selected' if trek and trek.difficulty == level else '' }}>{{ level }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Total Slots</label>
                        <input type="number" class="form-control" name="total_slots" min="1" value="{{ trek.total_slots if trek else '' }}" required>
                    </div>
                </div>
                {% if trek %}
                <div class="col-md-4 mb-3">
                    <label class="form-label">Duration</label>
                    <input type="text" class="form-control" value="{{ trek.duration }} days" disabled>
                </div>
                {% endif %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Assign Staff</label>
                        <select class="form-select" name="assigned_staff_id">
                            <option value="">-- None --</option>
                            {% for staff in staff_list %}
                            <option value="{{ staff.id }}" {{ 'selected' if trek and trek.assigned_staff_id == staff.id else '' }}>{{ staff.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% if trek %}
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status">
                            {% for s in ['Pending', 'Approved', 'Open', 'Closed', 'Completed'] %}
                            <option value="{{ s }}" {{ 'selected' if trek and trek.status == s else '' }}>{{ s }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" class="form-control" name="start_date" value="{{ trek.start_date if trek else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-control" name="end_date" value="{{ trek.end_date if trek else '' }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="3">{{ trek.description if trek else '' }}</textarea>
                </div>

                <a href="{{ url_for('admin.manage_treks') }}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
